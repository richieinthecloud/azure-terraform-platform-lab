name: Terraform PR Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "environments/dev/**"
      - "modules/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-pr:
  runs-on: ubuntu-latest
  environment: dev

  defaults:
    run:
      working-directory: environments/dev

  env:
    ARM_CLEINT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    ARM_SUBSCRIPTION_ID: $(( secrets.AZURE_SUBSCRIPTION_ID }}
    ARM_USE_OIDC: true

  steps:
    - name: Checkout repository
    uses: 
    
